<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 
    Writeme Logo - The Connected Notepad
    Concept:
    - Primary Symbol: A modern, layered Notepad (Direct reference to Writing/Notes).
    - Modularity: The notepad is composed of distinct, interlocking blocks/sheets.
    - Second Brain: Connectivity nodes and neural paths linking the sheets.
    - Privacy: Encapsulated in a secure, deep-slate squircle base.
    - Style: Flat, High-Contrast, Professional.
  -->
  
  <!-- Background Squircle (Privacy & Stability) -->
  <rect width="512" height="512" rx="120" fill="#0f172a" />

  <!-- The Notepad Structure (Reference to Writing) -->
  <g transform="translate(120, 100)">
    <!-- Base Layer (The Paper Stack) -->
    <rect x="0" y="20" width="272" height="312" rx="16" fill="#1e293b" />
    
    <!-- Top Modular Sheet (Text Editor - Blue) -->
    <path d="M0 36 C0 20 16 20 16 20 L256 20 C272 20 272 36 272 36 L272 316 C272 332 256 332 256 332 L16 332 C0 332 0 316 0 316 Z" fill="#3b82f6" />
    
    <!-- Notepad Bindings / Modular Blocks (Reference to Writeme name/blocks) -->
    <rect x="40" y="0" width="30" height="50" rx="8" fill="#ffffff" />
    <rect x="121" y="0" width="30" height="50" rx="8" fill="#ffffff" />
    <rect x="202" y="0" width="30" height="50" rx="8" fill="#ffffff" />

    <!-- Connectivity / Second Brain Elements -->
    <g transform="translate(40, 80)">
      <!-- Neural Connection Path (The "W" gesture) -->
      <path d="M20 40 L60 140 L100 40 L140 140 L180 40" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      
      <!-- Nodes (Connectivity / Knowledge Graph) -->
      <circle cx="20" cy="40" r="14" fill="#ffffff" />
      <circle cx="100" cy="40" r="14" fill="#ffffff" />
      <circle cx="180" cy="40" r="14" fill="#ffffff" />
      
      <!-- AI / Intelligence Points -->
      <circle cx="60" cy="140" r="18" fill="#a855f7" stroke="#ffffff" stroke-width="4" />
      <circle cx="140" cy="140" r="18" fill="#a855f7" stroke="#ffffff" stroke-width="4" />
    </g>

    <!-- Stylized Writing/Code Lines (Modularity) -->
    <rect x="40" y="260" width="192" height="8" rx="4" fill="#0f172a" opacity="0.3" />
    <rect x="40" y="284" width="120" height="8" rx="4" fill="#0f172a" opacity="0.3" />
  </g>

  <!-- Finishing: High-contrast edge for premium feel -->
  <rect x="4" y="4" width="504" height="504" rx="118" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1" />
</svg>
