<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: Deep, focused workspace -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Block / Node Color: Logic and Editor (Blue) -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Connection / AI Color: Intelligence (Violet) -->
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Highlights and Glass Effects -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Glow for Connections (Second Brain) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Photorealistic Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base Plate -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />
  
  <!-- Sub-Modular "W" Grid (Reference to Writeme & Modularity) -->
  <g transform="translate(112, 140)" filter="url(#shadow)">
    <!-- Column 1 (Abstract W Start) -->
    <rect x="0" y="40" width="60" height="180" rx="12" fill="url(#nodeGrad)"/>
    <rect x="0" y="40" width="60" height="90" rx="12" fill="url(#glass)"/>
    
    <!-- Column 2 (Abstract W Center Left) -->
    <rect x="75" y="130" width="60" height="90" rx="12" fill="url(#nodeGrad)"/>
    <rect x="75" y="130" width="60" height="45" rx="12" fill="url(#glass)"/>

    <!-- Column 3 (Abstract W Center Right) -->
    <rect x="150" y="80" width="60" height="140" rx="12" fill="url(#nodeGrad)"/>
    <rect x="150" y="80" width="60" height="70" rx="12" fill="url(#glass)"/>
    
    <!-- Column 4 (Abstract W End) -->
    <rect x="225" y="0" width="60" height="220" rx="12" fill="url(#nodeGrad)"/>
    <rect x="225" y="0" width="60" height="110" rx="12" fill="url(#glass)"/>

    <!-- Neural Connections (References to Second Brain / Links) -->
    <g filter="url(#glow)">
      <!-- Connections across blocks -->
      <line x1="30" y1="70" x2="105" y2="175" stroke="url(#linkGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <line x1="105" y1="175" x2="180" y2="120" stroke="url(#linkGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <line x1="180" y1="120" x2="255" y2="40" stroke="url(#linkGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      
      <!-- Nodes at intersection points -->
      <circle cx="30" cy="70" r="8" fill="#ffffff"/>
      <circle cx="105" cy="175" r="8" fill="#ffffff"/>
      <circle cx="180" cy="120" r="8" fill="#ffffff"/>
      <circle cx="255" cy="40" r="8" fill="#ffffff"/>
    </g>

    <!-- Stylized Pen Nib / Editor Cursor (Integrated into the last block) -->
    <path d="M255 240 L240 280 L255 270 L270 280 Z" fill="#ffffff" filter="url(#glow)"/>
    <rect x="252" y="240" width="6" height="30" rx="3" fill="#ffffff"/>
  </g>

  <!-- Finishing: Glass overlay border -->
  <rect x="3" y="3" width="506" height="506" rx="117" fill="none" stroke="url(#glass)" stroke-width="3" opacity="0.4"/>
</svg>
